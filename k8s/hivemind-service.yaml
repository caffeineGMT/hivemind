apiVersion: v1
kind: Service
metadata:
  name: hivemind-service
  namespace: hivemind
  labels:
    app: hivemind-engine
spec:
  type: LoadBalancer
  selector:
    app: hivemind-engine
    component: app
  ports:
  - name: http
    port: 80
    targetPort: 3100
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours for WebSocket connections
---
apiVersion: v1
kind: Service
metadata:
  name: hivemind-nodeport
  namespace: hivemind
  labels:
    app: hivemind-engine
spec:
  type: NodePort
  selector:
    app: hivemind-engine
    component: app
  ports:
  - name: http
    port: 3100
    targetPort: 3100
    nodePort: 30100  # Accessible on <node-ip>:30100
    protocol: TCP
