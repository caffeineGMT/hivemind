apiVersion: v1
kind: Secret
metadata:
  name: hivemind-secrets
  namespace: hivemind
type: Opaque
stringData:
  # REQUIRED: Get your Claude API key from https://console.anthropic.com
  anthropic-api-key: "REPLACE_WITH_YOUR_ANTHROPIC_API_KEY"

  # REQUIRED: On-premise license key (contact sales@hivemind.com)
  license-key: "HIVE-1-XXXXXXXX-UNLIMITED"

  # Database credentials
  postgres-password: "REPLACE_WITH_SECURE_PASSWORD"
  postgres-connection-string: "postgresql://hivemind:REPLACE_WITH_SECURE_PASSWORD@hivemind-postgres:5432/hivemind"
