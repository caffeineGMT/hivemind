# Optional: PostgreSQL StatefulSet for enterprise deployments
# For SQLite, you can skip this file
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: hivemind
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hivemind-postgres
  namespace: hivemind
  labels:
    app: hivemind-engine
    component: postgres
spec:
  serviceName: hivemind-postgres
  replicas: 1
  selector:
    matchLabels:
      app: hivemind-engine
      component: postgres
  template:
    metadata:
      labels:
        app: hivemind-engine
        component: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "hivemind"
        - name: POSTGRES_USER
          value: "hivemind"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hivemind-secrets
              key: postgres-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - hivemind
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - hivemind
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hivemind-postgres
  namespace: hivemind
  labels:
    app: hivemind-engine
    component: postgres
spec:
  type: ClusterIP
  selector:
    app: hivemind-engine
    component: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
