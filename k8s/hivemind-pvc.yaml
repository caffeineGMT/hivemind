apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hivemind-data-pvc
  namespace: hivemind
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard  # Change to your cluster's storage class
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hivemind-logs-pvc
  namespace: hivemind
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard  # Change to your cluster's storage class
