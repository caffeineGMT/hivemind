<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hivemind Engine - Product Hunt Cover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }

        .cover {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated grid background */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(40px, 40px);
            }
        }

        /* Content container */
        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 80px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .brand h1 {
            font-size: 42px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
        }

        .brand p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
        }

        .tagline {
            font-size: 64px;
            font-weight: 800;
            color: white;
            line-height: 1.1;
            letter-spacing: -2px;
            max-width: 900px;
        }

        .tagline .highlight {
            background: linear-gradient(90deg, #ffd89b 0%, #19547b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Agent workflow visualization */
        .workflow {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .agent-node {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 15px 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        .agent-node:nth-child(1) { animation-delay: 0s; }
        .agent-node:nth-child(3) { animation-delay: 0.3s; }
        .agent-node:nth-child(5) { animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.2);
            }
        }

        .arrow {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.6);
            animation: arrowMove 1.5s ease-in-out infinite;
        }

        @keyframes arrowMove {
            0%, 100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(5px);
            }
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badges {
            display: flex;
            gap: 15px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cta {
            background: white;
            color: #667eea;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        .cta:hover {
            transform: translateY(-2px);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 40%; left: 80%; animation-delay: 1s; }
        .particle:nth-child(3) { top: 60%; left: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { top: 80%; left: 70%; animation-delay: 3s; }
        .particle:nth-child(5) { top: 30%; left: 50%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) scale(1);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-30px) scale(1.5);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="cover">
        <!-- Animated grid background -->
        <div class="grid"></div>

        <!-- Floating particles -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- Main content -->
        <div class="content">
            <!-- Header -->
            <div class="header">
                <div class="logo">🧠</div>
                <div class="brand">
                    <h1>Hivemind Engine</h1>
                    <p>Autonomous AI Orchestrator</p>
                </div>
            </div>

            <!-- Main content -->
            <div class="main">
                <div class="tagline">
                    Spawn <span class="highlight">agent teams</span> that build businesses for you
                </div>

                <!-- Agent workflow -->
                <div class="workflow">
                    <div class="agent-node">
                        <span>🔍</span> Scraper
                    </div>
                    <div class="arrow">→</div>
                    <div class="agent-node">
                        <span>✍️</span> Writer
                    </div>
                    <div class="arrow">→</div>
                    <div class="agent-node">
                        <span>📧</span> Sender
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="badges">
                    <div class="badge">
                        <span>⭐</span> Open Source
                    </div>
                    <div class="badge">
                        <span>🔄</span> Self-Healing
                    </div>
                    <div class="badge">
                        <span>📊</span> Real-Time Analytics
                    </div>
                </div>
                <div class="cta">
                    Launch on Product Hunt →
                </div>
            </div>
        </div>
    </div>

    </script>
</body>
</html>
