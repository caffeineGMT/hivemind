<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Hivemind Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #09090b;
        color: #fafafa;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      .container {
        text-align: center;
        max-width: 500px;
      }

      .icon {
        font-size: 5rem;
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 1rem;
        color: #f59e0b;
      }

      p {
        font-size: 1.125rem;
        line-height: 1.75;
        color: #a1a1aa;
        margin-bottom: 2rem;
      }

      .retry-btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #f59e0b;
        color: #09090b;
        text-decoration: none;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.2s;
        cursor: pointer;
        border: none;
      }

      .retry-btn:hover {
        background: #d97706;
        transform: translateY(-2px);
      }

      .retry-btn:active {
        transform: translateY(0);
      }

      .cached-notice {
        margin-top: 2rem;
        padding: 1rem;
        background: #18181b;
        border-radius: 0.5rem;
        border: 1px solid #27272a;
      }

      .cached-notice p {
        margin: 0;
        font-size: 0.875rem;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>
        Looks like you've lost your internet connection. Don't worry - we've cached some content for you to browse while you're offline.
      </p>
      <button class="retry-btn" onclick="window.location.reload()">
        Try Again
      </button>

      <div class="cached-notice">
        <p>
          💡 <strong>Tip:</strong> Recent pages you've visited are available offline. Your actions will sync automatically when you're back online.
        </p>
      </div>
    </div>

    <script>
      // Auto-retry when online
      window.addEventListener('online', () => {
        console.log('Connection restored, reloading...');
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      });

      // Show online/offline status
      window.addEventListener('offline', () => {
        console.log('Connection lost');
      });

      // Check connection status
      if (navigator.onLine) {
        window.location.reload();
      }
    </script>
  </body>
</html>
